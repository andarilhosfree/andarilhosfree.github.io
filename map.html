    <style>
        html {
            scroll-behavior: smooth;
        }

        .banner-blur-overlay {
            position: relative;
            overflow: hidden;
        }

        .banner-blur-overlay::before {
            content: "";
            position: absolute;
            inset: 0;
            background: rgba(0, 0, 0, 0.1);
            backdrop-filter: blur(2px);
            -webkit-backdrop-filter: blur(2px);
            z-index: 1;
        }

        .banner-blur-overlay .container {
            position: relative;
            z-index: 2;
        }

        .partner-list .partner-item {
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 10px;
            flex-wrap: nowrap;
        }

        .partner-list .partner-name {
            white-space: nowrap;
            font-size: 14px;
        }

        .partner-list .partner-social {
            display: flex;
            flex-wrap: nowrap;
            white-space: nowrap;
            margin: 0;
        }

        .partner-list .partner-social li {
            margin: 0 0 0 6px;
        }

        .partner-list .partner-social .site-button {
            width: 40px;
            height: 40px;
            line-height: 40px;
            padding: 0;
        }

        .partner-list .partner-social .site-button.twitch {
            background: #9146ff;
            border-color: #9146ff;
            color: #fff;
        }

        .map-content-area {
            width: 100%;
            height: 100vh;
            min-height: 70vh;
            display: flex;
            flex-direction: column;
        }

        #tibia-map {
            width: 100%;
            flex: 1 1 auto;
            min-height: 0;
        }

        .tibia-map-interaction-overlay {
            position: absolute;
            inset: 0;
            z-index: 1000;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 24px;
            text-align: center;
            cursor: pointer;
            background: rgba(255, 255, 255, 0.65);
            backdrop-filter: blur(3px);
            -webkit-backdrop-filter: blur(3px);
        }

        .tibia-map-interaction-overlay.is-hidden {
            display: none;
        }

        .tibia-map-interaction-overlay__text {
            font-size: 22px;
            line-height: 1.3;
            font-weight: 700;
            color: #111;
            max-width: 720px;
        }

        @media (max-width: 767.98px) {
            .tibia-map-interaction-overlay__text {
                font-size: 18px;
            }
        }

        .tibia-floor-control a {
            text-decoration: none;
        }

        .tibia-floor-control .tibia-floor-label {
            cursor: default;
            font-weight: 700;
        }

        /* Ensure the sticky header always stays above Leaflet controls. */
        .is-fixed .main-bar {
            z-index: 99999;
        }

        @media (max-width: 767.98px) {
            .partner-list {
                overflow-x: hidden;
            }

            .partner-list .partner-item {
                align-items: flex-start;
                gap: 8px;
            }

            .partner-list .partner-name {
                white-space: normal;
                line-height: 1.25;
                max-width: 115px;
                word-break: break-word;
            }

            .partner-list .partner-social {
                flex-shrink: 0;
            }

            .partner-list .partner-social li {
                margin-left: 4px;
            }

            .partner-list .partner-social .site-button {
                width: 34px;
                height: 34px;
                line-height: 34px;
            }
        }
    </style>
